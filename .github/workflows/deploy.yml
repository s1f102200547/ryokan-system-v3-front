name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: asia-northeast1
  SERVICE: ryokan-system
  REGISTRY: asia-northeast1-docker.pkg.dev
  REPO: ryokan   # Artifact Registry のリポジトリ名

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      - uses: actions/checkout@v4 # ソースコードを取得

      # Workload Identity Federation で GCP に認証（キーファイル不要）
      - id: auth
        uses: google-github-actions/auth@v2 # GCP認証
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      # Artifact Registry への docker push を許可
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Docker イメージのビルド & プッシュ（GHA キャッシュで高速化）
      - uses: docker/setup-buildx-action@v3 # DockerBuild
      - uses: docker/build-push-action@v6   # GCPにpush(upload)
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          # NEXT_PUBLIC_ はビルド時に埋め込まれるため build-args で渡す
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cloud Run へデプロイ
      - uses: google-github-actions/deploy-cloudrun@v2  # 作ったDockerImageをCloudRunに乗せる
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          # サーバーサイド専用の環境変数（Firebase Admin は ADC で自動認証、NEXT_PUBLIC_ 不要）
          env_vars: |
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          flags: --allow-unauthenticated
